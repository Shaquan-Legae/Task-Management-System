<div class="card">

    <h2>Tasks</h2>

    <div class="loading" *ngIf="isLoading">
        Loading tasks...
    </div>

    <div class="error" *ngIf="errorMessage">
        {{ errorMessage }}
    </div>

    <div class="empty" *ngIf="!isLoading && tasks.length === 0">
        No tasks available.
    </div>

    <div class="task" *ngFor="let task of tasks; trackBy: trackByTaskId">

        <div>

            <h3>{{task.title}}</h3>

            <span class="badge" [ngClass]="{
                'high': task.priority==='High',
                'medium': task.priority==='Medium',
                'low': task.priority==='Low'
            }">

                {{task.priority}}

            </span>

            <p class="status" [ngClass]="{'completed': task.completed, 'pending': !task.completed}">

                {{task.completed ? '✓ Completed' : '○ Pending'}}

            </p>

        </div>

        <button *ngIf="!task.completed" (click)="completeTask(task.id)" class="complete-btn">

            Complete

        </button>

        <button *ngIf="task.completed" disabled class="completed-btn">

            ✓ Done

        </button>

    </div>

</div>
